<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NATMap 管理后台</title>
    
    <!-- Material UI Fonts & Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Material UI -->
    <script crossorigin src="https://unpkg.com/@mui/material@5.14.0/umd/material-ui.production.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: #f5f5f5; }
        .loading { display: flex; justify-content: center; align-items: center; height: 100vh; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">
            <div style="text-align: center;">
                <div style="font-size: 24px; margin-bottom: 16px;">加载中...</div>
                <div style="color: #666;">正在初始化管理后台</div>
            </div>
        </div>
    </div>

    <script type="text/babel">
        const {
            AppBar,
            Box,
            Button,
            Card,
            CardContent,
            Container,
            Dialog,
            DialogActions,
            DialogContent,
            DialogTitle,
            Fab,
            FormControl,
            Grid,
            IconButton,
            InputLabel,
            MenuItem,
            Paper,
            Select,
            Snackbar,
            Alert,
            Tab,
            Tabs,
            Table,
            TableBody,
            TableCell,
            TableContainer,
            TableHead,
            TableRow,
            TextField,
            Toolbar,
            Typography,
            Chip,
            Tooltip,
            CircularProgress,
            Divider
        } = MaterialUI;

        // 从 URL 获取 admin key
        const urlParams = new URLSearchParams(window.location.search);
        const ADMIN_KEY = urlParams.get('key') || '';
        const API_BASE = '/api/admin?key=' + encodeURIComponent(ADMIN_KEY);

        // API 请求封装
        const api = {
            async get(type = 'all') {
                const res = await fetch(`${API_BASE}&type=${type}`);
                return res.json();
            },
            async post(type, data) {
                const res = await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, data })
                });
                return res.json();
            },
            async put(type, id, data) {
                const res = await fetch(API_BASE, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, id, data })
                });
                return res.json();
            },
            async delete(type, id) {
                const res = await fetch(`${API_BASE}&type=${type}&id=${id}`, {
                    method: 'DELETE'
                });
                return res.json();
            }
        };

        // 通知组件
        function Notification({ open, message, severity, onClose }) {
            return (
                <Snackbar open={open} autoHideDuration={3000} onClose={onClose} anchorOrigin={{ vertical: 'top', horizontal: 'right' }}>
                    <Alert severity={severity} onClose={onClose}>{message}</Alert>
                </Snackbar>
            );
        }

        // 租户管理组件
        function TenantManager({ tenants, onRefresh }) {
            const [open, setOpen] = React.useState(false);
            const [editing, setEditing] = React.useState(null);
            const [formData, setFormData] = React.useState({ name: '', api_key: '' });
            const [loading, setLoading] = React.useState(false);

            const handleOpen = (tenant = null) => {
                if (tenant) {
                    setEditing(tenant);
                    setFormData({ name: tenant.name, api_key: tenant.api_key });
                } else {
                    setEditing(null);
                    setFormData({ name: '', api_key: '' });
                }
                setOpen(true);
            };

            const handleClose = () => {
                setOpen(false);
                setEditing(null);
            };

            const handleSubmit = async () => {
                if (!formData.name || !formData.api_key) {
                    alert('请填写完整信息');
                    return;
                }
                setLoading(true);
                try {
                    if (editing) {
                        await api.put('tenant', editing.id, formData);
                    } else {
                        await api.post('tenant', formData);
                    }
                    handleClose();
                    onRefresh();
                } catch (err) {
                    alert('操作失败: ' + err.message);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (!confirm('确定要删除这家公司吗？')) return;
                try {
                    const result = await api.delete('tenant', id);
                    if (result.error) {
                        alert(result.error);
                    } else {
                        onRefresh();
                    }
                } catch (err) {
                    alert('删除失败: ' + err.message);
                }
            };

            return (
                <Box>
                    <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                        <Typography variant="h6">公司管理</Typography>
                        <Button variant="contained" startIcon={<span className="material-icons">add</span>} onClick={() => handleOpen()}>
                            添加公司
                        </Button>
                    </Box>

                    <TableContainer component={Paper}>
                        <Table>
                            <TableHead>
                                <TableRow>
                                    <TableCell>ID</TableCell>
                                    <TableCell>公司名称</TableCell>
                                    <TableCell>API Key</TableCell>
                                    <TableCell>创建时间</TableCell>
                                    <TableCell align="right">操作</TableCell>
                                </TableRow>
                            </TableHead>
                            <TableBody>
                                {tenants.map(t => (
                                    <TableRow key={t.id}>
                                        <TableCell>{t.id}</TableCell>
                                        <TableCell>{t.name}</TableCell>
                                        <TableCell>
                                            <code style={{ background: '#f5f5f5', padding: '2px 6px', borderRadius: '4px' }}>{t.api_key}</code>
                                        </TableCell>
                                        <TableCell>{t.created_at}</TableCell>
                                        <TableCell align="right">
                                            <Tooltip title="编辑">
                                                <IconButton onClick={() => handleOpen(t)} size="small">
                                                    <span className="material-icons">edit</span>
                                                </IconButton>
                                            </Tooltip>
                                            <Tooltip title="删除">
                                                <IconButton onClick={() => handleDelete(t.id)} size="small" color="error">
                                                    <span className="material-icons">delete</span>
                                                </IconButton>
                                            </Tooltip>
                                        </TableCell>
                                    </TableRow>
                                ))}
                                {tenants.length === 0 && (
                                    <TableRow>
                                        <TableCell colSpan={5} align="center" sx={{ color: 'text.secondary', py: 4 }}>
                                            暂无数据
                                        </TableCell>
                                    </TableRow>
                                )}
                            </TableBody>
                        </Table>
                    </TableContainer>

                    <Dialog open={open} onClose={handleClose} maxWidth="sm" fullWidth>
                        <DialogTitle>{editing ? '编辑公司' : '添加公司'}</DialogTitle>
                        <DialogContent>
                            <TextField
                                autoFocus
                                margin="dense"
                                label="公司名称"
                                fullWidth
                                value={formData.name}
                                onChange={e => setFormData({...formData, name: e.target.value})}
                                sx={{ mb: 2 }}
                            />
                            <TextField
                                margin="dense"
                                label="API Key"
                                fullWidth
                                value={formData.api_key}
                                onChange={e => setFormData({...formData, api_key: e.target.value})}
                                helperText="用于客户端认证的密钥"
                            />
                        </DialogContent>
                        <DialogActions>
                            <Button onClick={handleClose}>取消</Button>
                            <Button onClick={handleSubmit} variant="contained" disabled={loading}>
                                {loading ? <CircularProgress size={24} /> : '保存'}
                            </Button>
                        </DialogActions>
                    </Dialog>
                </Box>
            );
        }

        // 应用管理组件
        function AppManager({ apps, tenants, onRefresh }) {
            const [open, setOpen] = React.useState(false);
            const [editing, setEditing] = React.useState(null);
            const [formData, setFormData] = React.useState({ tenant_id: '', app_name: '' });
            const [loading, setLoading] = React.useState(false);

            const handleOpen = (app = null) => {
                if (app) {
                    setEditing(app);
                    setFormData({ tenant_id: app.tenant_id, app_name: app.app_name });
                } else {
                    setEditing(null);
                    setFormData({ tenant_id: tenants[0]?.id || '', app_name: '' });
                }
                setOpen(true);
            };

            const handleClose = () => {
                setOpen(false);
                setEditing(null);
            };

            const handleSubmit = async () => {
                if (!formData.tenant_id || !formData.app_name) {
                    alert('请填写完整信息');
                    return;
                }
                setLoading(true);
                try {
                    if (editing) {
                        await api.put('app', editing.id, formData);
                    } else {
                        await api.post('app', formData);
                    }
                    handleClose();
                    onRefresh();
                } catch (err) {
                    alert('操作失败: ' + err.message);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (!confirm('确定要删除这个应用吗？')) return;
                try {
                    const result = await api.delete('app', id);
                    if (result.error) {
                        alert(result.error);
                    } else {
                        onRefresh();
                    }
                } catch (err) {
                    alert('删除失败: ' + err.message);
                }
            };

            return (
                <Box>
                    <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                        <Typography variant="h6">应用管理</Typography>
                        <Button variant="contained" startIcon={<span className="material-icons">add</span>} onClick={() => handleOpen()}>
                            添加应用
                        </Button>
                    </Box>

                    <TableContainer component={Paper}>
                        <Table>
                            <TableHead>
                                <TableRow>
                                    <TableCell>ID</TableCell>
                                    <TableCell>应用名称</TableCell>
                                    <TableCell>所属公司</TableCell>
                                    <TableCell>创建时间</TableCell>
                                    <TableCell align="right">操作</TableCell>
                                </TableRow>
                            </TableHead>
                            <TableBody>
                                {apps.map(a => (
                                    <TableRow key={a.id}>
                                        <TableCell>{a.id}</TableCell>
                                        <TableCell>
                                            <Chip label={a.app_name} size="small" color="primary" variant="outlined" />
                                        </TableCell>
                                        <TableCell>{a.tenant_name}</TableCell>
                                        <TableCell>{a.created_at}</TableCell>
                                        <TableCell align="right">
                                            <Tooltip title="编辑">
                                                <IconButton onClick={() => handleOpen(a)} size="small">
                                                    <span className="material-icons">edit</span>
                                                </IconButton>
                                            </Tooltip>
                                            <Tooltip title="删除">
                                                <IconButton onClick={() => handleDelete(a.id)} size="small" color="error">
                                                    <span className="material-icons">delete</span>
                                                </IconButton>
                                            </Tooltip>
                                        </TableCell>
                                    </TableRow>
                                ))}
                                {apps.length === 0 && (
                                    <TableRow>
                                        <TableCell colSpan={5} align="center" sx={{ color: 'text.secondary', py: 4 }}>
                                            暂无数据
                                        </TableCell>
                                    </TableRow>
                                )}
                            </TableBody>
                        </Table>
                    </TableContainer>

                    <Dialog open={open} onClose={handleClose} maxWidth="sm" fullWidth>
                        <DialogTitle>{editing ? '编辑应用' : '添加应用'}</DialogTitle>
                        <DialogContent>
                            <FormControl fullWidth margin="dense" sx={{ mb: 2 }}>
                                <InputLabel>所属公司</InputLabel>
                                <Select
                                    value={formData.tenant_id}
                                    onChange={e => setFormData({...formData, tenant_id: e.target.value})}
                                    label="所属公司"
                                >
                                    {tenants.map(t => (
                                        <MenuItem key={t.id} value={t.id}>{t.name}</MenuItem>
                                    ))}
                                </Select>
                            </FormControl>
                            <TextField
                                margin="dense"
                                label="应用名称"
                                fullWidth
                                value={formData.app_name}
                                onChange={e => setFormData({...formData, app_name: e.target.value})}
                                helperText="例如: vpn, ssh, rdp"
                            />
                        </DialogContent>
                        <DialogActions>
                            <Button onClick={handleClose}>取消</Button>
                            <Button onClick={handleSubmit} variant="contained" disabled={loading}>
                                {loading ? <CircularProgress size={24} /> : '保存'}
                            </Button>
                        </DialogActions>
                    </Dialog>
                </Box>
            );
        }

        // 映射管理组件
        function MappingManager({ mappings, onRefresh }) {
            const handleDelete = async (id) => {
                if (!confirm('确定要删除这条映射记录吗？')) return;
                try {
                    await api.delete('mapping', id);
                    onRefresh();
                } catch (err) {
                    alert('删除失败: ' + err.message);
                }
            };

            return (
                <Box>
                    <Box sx={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', mb: 2 }}>
                        <Typography variant="h6">映射记录</Typography>
                        <Typography variant="body2" color="text.secondary">
                            显示最新的 100 条记录
                        </Typography>
                    </Box>

                    <TableContainer component={Paper}>
                        <Table size="small">
                            <TableHead>
                                <TableRow>
                                    <TableCell>ID</TableCell>
                                    <TableCell>公司</TableCell>
                                    <TableCell>应用</TableCell>
                                    <TableCell>公网地址</TableCell>
                                    <TableCell>本地地址</TableCell>
                                    <TableCell>协议</TableCell>
                                    <TableCell>更新时间</TableCell>
                                    <TableCell align="right">操作</TableCell>
                                </TableRow>
                            </TableHead>
                            <TableBody>
                                {mappings.map(m => (
                                    <TableRow key={m.id}>
                                        <TableCell>{m.id}</TableCell>
                                        <TableCell>{m.tenant_name}</TableCell>
                                        <TableCell>
                                            <Chip label={m.app_name} size="small" color="primary" variant="outlined" />
                                        </TableCell>
                                        <TableCell>
                                            <code style={{ background: '#e3f2fd', padding: '2px 6px', borderRadius: '4px', color: '#1976d2' }}>
                                                {m.public_ip}:{m.public_port}
                                            </code>
                                        </TableCell>
                                        <TableCell>{m.local_ip}:{m.local_port}</TableCell>
                                        <TableCell>
                                            <Chip label={m.protocol?.toUpperCase()} size="small" />
                                        </TableCell>
                                        <TableCell>{m.updated_at}</TableCell>
                                        <TableCell align="right">
                                            <Tooltip title="删除">
                                                <IconButton onClick={() => handleDelete(m.id)} size="small" color="error">
                                                    <span className="material-icons">delete</span>
                                                </IconButton>
                                            </Tooltip>
                                        </TableCell>
                                    </TableRow>
                                ))}
                                {mappings.length === 0 && (
                                    <TableRow>
                                        <TableCell colSpan={8} align="center" sx={{ color: 'text.secondary', py: 4 }}>
                                            暂无映射记录
                                        </TableCell>
                                    </TableRow>
                                )}
                            </TableBody>
                        </Table>
                    </TableContainer>
                </Box>
            );
        }

        // 主应用组件
        function App() {
            const [tab, setTab] = React.useState(0);
            const [data, setData] = React.useState({ tenants: [], apps: [], mappings: [] });
            const [loading, setLoading] = React.useState(true);
            const [notification, setNotification] = React.useState({ open: false, message: '', severity: 'info' });

            const fetchData = async () => {
                setLoading(true);
                try {
                    const result = await api.get('all');
                    if (result.error) {
                        showNotification(result.error, 'error');
                    } else {
                        setData({
                            tenants: result.tenants || [],
                            apps: result.apps || [],
                            mappings: result.mappings || []
                        });
                    }
                } catch (err) {
                    showNotification('加载数据失败: ' + err.message, 'error');
                }
                setLoading(false);
            };

            const showNotification = (message, severity = 'info') => {
                setNotification({ open: true, message, severity });
            };

            const handleCloseNotification = () => {
                setNotification({ ...notification, open: false });
            };

            React.useEffect(() => {
                fetchData();
            }, []);

            if (!ADMIN_KEY) {
                return (
                    <Container maxWidth="sm" sx={{ mt: 10 }}>
                        <Paper sx={{ p: 4, textAlign: 'center' }}>
                            <Typography variant="h5" color="error" gutterBottom>
                                访问被拒绝
                            </Typography>
                            <Typography color="text.secondary">
                                请在 URL 中添加 admin key 参数: ?key=YOUR_ADMIN_KEY
                            </Typography>
                        </Paper>
                    </Container>
                );
            }

            return (
                <Box sx={{ flexGrow: 1 }}>
                    <AppBar position="static">
                        <Toolbar>
                            <Typography variant="h6" component="div" sx={{ flexGrow: 1 }}>
                                NATMap 管理后台
                            </Typography>
                            <Button color="inherit" onClick={fetchData} startIcon={<span className="material-icons">refresh</span>}>
                                刷新
                            </Button>
                        </Toolbar>
                    </AppBar>

                    <Container maxWidth="lg" sx={{ mt: 3, mb: 4 }}>
                        <Paper sx={{ mb: 2 }}>
                            <Tabs value={tab} onChange={(e, v) => setTab(v)} variant="fullWidth">
                                <Tab label={`公司 (${data.tenants.length})`} />
                                <Tab label={`应用 (${data.apps.length})`} />
                                <Tab label={`映射 (${data.mappings.length})`} />
                            </Tabs>
                        </Paper>

                        {loading ? (
                            <Box sx={{ display: 'flex', justifyContent: 'center', py: 8 }}>
                                <CircularProgress />
                            </Box>
                        ) : (
                            <>
                                {tab === 0 && (
                                    <TenantManager 
                                        tenants={data.tenants} 
                                        onRefresh={fetchData}
                                    />
                                )}
                                {tab === 1 && (
                                    <AppManager 
                                        apps={data.apps} 
                                        tenants={data.tenants}
                                        onRefresh={fetchData}
                                    />
                                )}
                                {tab === 2 && (
                                    <MappingManager 
                                        mappings={data.mappings}
                                        onRefresh={fetchData}
                                    />
                                )}
                            </>
                        )}
                    </Container>

                    <Notification 
                        open={notification.open}
                        message={notification.message}
                        severity={notification.severity}
                        onClose={handleCloseNotification}
                    />
                </Box>
            );
        }

        // 渲染应用
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
